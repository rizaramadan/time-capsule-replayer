<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Episode Replayer</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #0b0b0c; color: #e8e8ea; font: 16px/1.5 -apple-system, system-ui, sans-serif; }
  .wrap { min-height: 100%; display: grid; place-items: center; padding: 24px; box-sizing: border-box; }
  .card { width: 100%; max-width: 880px; }
  .player { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
  .player iframe, .player video { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #000; }
  .msg { padding: 32px; text-align: center; border: 1px solid #232327; border-radius: 12px; background: #131316; }
  .msg h1 { margin: 0 0 8px; font-size: 20px; font-weight: 600; }
  .msg p { margin: 4px 0; color: #a1a1a8; }
  .countdown { margin-top: 16px; font-variant-numeric: tabular-nums; font-size: 14px; color: #c8c8cf; }
  code { background: #1c1c20; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="root"></div>
  </div>

<script>
(function () {
  const root = document.getElementById('root');

  // Loaded from config.json on startup. Hash params override these per-request (useful for testing).
  let fileConfig = {};

  function parseHash() {
    // URLSearchParams decodes '+' as space, breaking ISO timezone offsets like +07:00.
    // Pre-encode literal '+' so it survives as '+'.
    const h = location.hash.replace(/^#/, '').replace(/\+/g, '%2B');
    const p = new URLSearchParams(h);
    const pick = (k) => p.get(k) != null ? p.get(k) : fileConfig[k];
    return {
      v: pick('v'),
      src: pick('src'),
      start: pick('start'),
      end: pick('end'),
      title: pick('title') || 'Episode Replayer',
      t: pick('t'),
    };
  }

  // SHA-256 the URL token once per value and cache it. render() compares the
  // cached hash to fileConfig.tokenHash to gate the player.
  let tokenAuth = { raw: null, hash: null, pending: false };
  async function ensureTokenHash(raw) {
    if (raw === tokenAuth.raw) return;
    tokenAuth.raw = raw;
    tokenAuth.hash = null;
    if (!raw) { render(); return; }
    tokenAuth.pending = true;
    const buf = new TextEncoder().encode(raw);
    const digest = await crypto.subtle.digest('SHA-256', buf);
    tokenAuth.hash = Array.from(new Uint8Array(digest))
      .map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
    tokenAuth.pending = false;
    render();
  }

  function fmt(d) {
    try { return new Date(d).toLocaleString(); } catch { return d; }
  }

  function msg(title, lines) {
    return `<div class="msg"><h1>${title}</h1>${lines.map(l => `<p>${l}</p>`).join('')}</div>`;
  }

  function countdownText(ms) {
    if (ms <= 0) return '';
    const s = Math.floor(ms / 1000);
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const parts = [];
    if (d) parts.push(d + 'd');
    if (d || h) parts.push(h + 'h');
    if (d || h || m) parts.push(m + 'm');
    parts.push(sec + 's');
    return parts.join(' ');
  }

  // currentView tracks what is mounted in the DOM so we only rebuild on state change.
  // Keys: 'missing' | 'invalid' | 'waiting' | 'open' | 'closed'
  // Suffix with video id for 'open' so a hashchange to a different video rebuilds.
  let currentView = null;
  let countdownEl = null;

  function render() {
    const { v, src, start, end, title, t } = parseHash();

    // Gate: token must hash to fileConfig.tokenHash. If config hasn't loaded yet
    // (no tokenHash present), defer rendering until it does to avoid a flash of
    // "Access required" while config.json is in flight.
    if (fileConfig.tokenHash) {
      if (t !== tokenAuth.raw) { ensureTokenHash(t); return; }
      if (tokenAuth.pending) return;
      if (!t || tokenAuth.hash !== fileConfig.tokenHash) {
        if (currentView !== 'denied') {
          root.innerHTML = msg('Access required', [
            'This link needs a valid access token.',
            'Make sure your URL includes <code>#t=YOUR_TOKEN</code>.',
          ]);
          currentView = 'denied';
          countdownEl = null;
        }
        return;
      }
    }

    if ((!v && !src) || !start || !end) {
      if (currentView !== 'missing') {
        root.innerHTML = msg('Missing parameters', [
          'Link must include <code>#v=YOUTUBE_ID</code> or <code>#src=URL</code>, plus <code>start</code> and <code>end</code>',
          'Example: <code>#v=dQw4w9WgXcQ&start=2026-04-10T19:00:00Z&end=2026-04-10T21:00:00Z</code>',
        ]);
        currentView = 'missing';
        countdownEl = null;
      }
      return;
    }

    const now = Date.now();
    const startMs = Date.parse(start);
    const endMs = Date.parse(end);

    if (isNaN(startMs) || isNaN(endMs)) {
      if (currentView !== 'invalid') {
        root.innerHTML = msg('Invalid date', ['<code>start</code> and <code>end</code> must be ISO 8601.']);
        currentView = 'invalid';
        countdownEl = null;
      }
      return;
    }

    const sourceKey = src ? 'src:' + src : 'v:' + v;

    if (now < startMs) {
      const view = 'waiting:' + startMs + ':' + endMs + ':' + title;
      if (currentView !== view) {
        root.innerHTML = msg(title, [
          'Available from <strong>' + fmt(startMs) + '</strong>',
          'until <strong>' + fmt(endMs) + '</strong>',
          '<div class="countdown" id="cd"></div>',
        ]);
        currentView = view;
        countdownEl = document.getElementById('cd');
      }
      if (countdownEl) countdownEl.textContent = 'Opens in ' + countdownText(startMs - now);
      return;
    }

    if (now > endMs) {
      if (currentView !== 'closed:' + endMs) {
        root.innerHTML = msg(title, [
          'This episode is no longer available.',
          'Window ended <strong>' + fmt(endMs) + '</strong>',
        ]);
        currentView = 'closed:' + endMs;
        countdownEl = null;
      }
      return;
    }

    const view = 'open:' + sourceKey + ':' + endMs;
    if (currentView !== view) {
      let playerHtml;
      if (src) {
        // Escape src for attribute context.
        const safeSrc = String(src).replace(/"/g, '&quot;');
        playerHtml = '<div class="player"><video src="' + safeSrc + '" controls controlsList="nodownload" disablePictureInPicture oncontextmenu="return false" playsinline></video></div>';
      } else {
        const ytSrc = 'https://www.youtube-nocookie.com/embed/' + encodeURIComponent(v) + '?rel=0&modestbranding=1';
        playerHtml = '<div class="player"><iframe src="' + ytSrc + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>';
      }
      root.innerHTML = playerHtml + '<div class="countdown" id="cd" style="text-align:center;margin-top:12px"></div>';
      currentView = view;
      countdownEl = document.getElementById('cd');
    }
    if (countdownEl) countdownEl.textContent = 'Closes in ' + countdownText(endMs - now);
  }

  // Fetch config.json with cache-bust so config edits propagate after a reload.
  // Page still renders if config.json is missing (hash-only mode).
  fetch('./config.json?t=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { return r.ok ? r.json() : {}; })
    .catch(function () { return {}; })
    .then(function (cfg) {
      fileConfig = cfg || {};
      render();
    });

  render();
  setInterval(render, 1000);
  window.addEventListener('hashchange', render);
})();
</script>
</body>
</html>
